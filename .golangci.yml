# golangci-lint configuration for Kisanlink ERP
# Optimized for fast pre-commit checks while catching real issues

version: "2"

run:
  timeout: 2m
  tests: true
  modules-download-mode: readonly

output:
  formats:
    text:
      path: stdout
      format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

# Linters configuration - minimal set for speed
linters:
  default: none
  enable:
    - govet
    - ineffassign

# Formatters
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: kisanlink-erp

# Linter settings
linters-settings:
  govet:
    disable:
      - shadow
      - fieldalignment

# Issues configuration
issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  fix: false

  exclude-rules:
    # Exclude test files from most linters
    - path: _test\.go
      linters:
        - gocritic
        - gosec
        - unparam

# Exclusions
exclusions:
  paths:
    - vendor
    - .git
    - tests/mocks
    - tests/testutils
  presets:
    - comments
    - std-error-handling
