syntax = "proto3";

package pb;

option go_package = "kisanlink-erp/pkg/proto";

// CheckRequest represents a single permission check request
message CheckRequest {
    string principal_id = 1;    // User ID requesting permission
    string resource_type = 2;   // Resource type (e.g., "user")
    string resource_id = 3;     // Resource ID (e.g., "USER_123" or "*")
    string action = 4;          // Action (e.g., "read", "create", "delete")
}

// CheckResponse represents the result of a permission check
message CheckResponse {
    bool allowed = 1;           // Whether permission is granted
    string reason = 2;          // Reason for the decision
    int32 status_code = 3;      // HTTP-like status code
    string message = 4;         // Additional message
}

// CheckItem represents a single item in a batch check
message CheckItem {
    string request_id = 1;      // Unique identifier for this check
    string principal_id = 2;    // User ID requesting permission
    string resource_type = 3;   // Resource type
    string resource_id = 4;     // Resource ID
    string action = 5;          // Action
}

// BatchCheckRequest represents multiple permission checks
message BatchCheckRequest {
    repeated CheckItem items = 1;
}

// BatchCheckResponse represents results of multiple permission checks
message BatchCheckResponse {
    repeated CheckResponse results = 1;
    int32 status_code = 2;
    string message = 3;
}

// AuthorizationService provides permission checking functionality
service AuthorizationService {
    // Check verifies if a user has permission to perform an action on a resource
    rpc Check(CheckRequest) returns (CheckResponse);

    // BatchCheck verifies multiple permissions in a single request
    rpc BatchCheck(BatchCheckRequest) returns (BatchCheckResponse);
}
