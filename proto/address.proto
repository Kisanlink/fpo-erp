syntax = "proto3";

package pb;

option go_package = "kisanlink-erp/pkg/proto";

import "google/protobuf/timestamp.proto";

// ========================================
// Address Messages
// ========================================

// Address represents an address entity
message Address {
    string id = 1;
    string user_id = 2;
    string type = 3;                    // HOME, WORK, OTHER
    optional string house = 4;
    optional string street = 5;
    optional string landmark = 6;
    optional string post_office = 7;
    optional string subdistrict = 8;
    optional string district = 9;
    optional string vtc = 10;           // Village/Town/City
    optional string state = 11;
    optional string country = 12;
    optional string pincode = 13;
    optional string full_address = 14;
    bool is_primary = 15;
    bool is_active = 16;
    google.protobuf.Timestamp created_at = 17;
    google.protobuf.Timestamp updated_at = 18;
}

// ========================================
// Request Messages
// ========================================

// CreateAddressRequest represents a request to create an address
message CreateAddressRequest {
    string user_id = 1;
    string type = 2;
    optional string house = 3;
    optional string street = 4;
    optional string landmark = 5;
    optional string post_office = 6;
    optional string subdistrict = 7;
    optional string district = 8;
    optional string vtc = 9;
    optional string state = 10;
    optional string country = 11;
    optional string pincode = 12;
    bool is_primary = 13;
}

// GetAddressRequest represents a request to get an address by ID
message GetAddressRequest {
    string address_id = 1;
}

// UpdateAddressRequest represents a request to update an address
message UpdateAddressRequest {
    string id = 1;
    string type = 2;
    optional string house = 3;
    optional string street = 4;
    optional string landmark = 5;
    optional string post_office = 6;
    optional string subdistrict = 7;
    optional string district = 8;
    optional string vtc = 9;
    optional string state = 10;
    optional string country = 11;
    optional string pincode = 12;
    bool is_primary = 13;
    bool is_active = 14;
}

// DeleteAddressRequest represents a request to delete an address
message DeleteAddressRequest {
    string address_id = 1;
    bool soft_delete = 2;
}

// SearchAddressesRequest represents a request to search addresses
message SearchAddressesRequest {
    string query = 1;
    int32 limit = 2;
    int32 offset = 3;
}

// ========================================
// Response Messages
// ========================================

// AddressResponse represents a response containing an address
message AddressResponse {
    bool success = 1;
    string message = 2;
    int32 status_code = 3;
    Address data = 4;
}

// DeleteAddressResponse represents a response for delete operation
message DeleteAddressResponse {
    bool success = 1;
    string message = 2;
    int32 status_code = 3;
}

// SearchAddressesResponse represents a response containing multiple addresses
message SearchAddressesResponse {
    bool success = 1;
    string message = 2;
    int32 status_code = 3;
    repeated Address data = 4;
    int32 total_count = 5;
}

// ========================================
// Address Service
// ========================================

// AddressService provides address management functionality
service AddressService {
    // CreateAddress creates a new address
    rpc CreateAddress(CreateAddressRequest) returns (AddressResponse);

    // GetAddress retrieves an address by ID
    rpc GetAddress(GetAddressRequest) returns (AddressResponse);

    // UpdateAddress updates an existing address
    rpc UpdateAddress(UpdateAddressRequest) returns (AddressResponse);

    // DeleteAddress deletes an address (soft or hard delete)
    rpc DeleteAddress(DeleteAddressRequest) returns (DeleteAddressResponse);

    // SearchAddresses searches for addresses
    rpc SearchAddresses(SearchAddressesRequest) returns (SearchAddressesResponse);
}
