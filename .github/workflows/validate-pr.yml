name: Validate Pull Request

on:
  pull_request:
    branches:
      - main
      - development
      - staging
    paths:
      - 'infrastructure/**'
      - 'Dockerfile'
      - '.github/workflows/**'
      - 'docker-compose.yml'

jobs:
  validate-iac:
    name: Validate Infrastructure as Code
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Validate CloudFormation template syntax
        run: |
          echo "Validating CloudFormation template..."
          aws cloudformation validate-template \
            --template-body file://infrastructure/templates/erp-application.yaml
          echo "✅ CloudFormation template syntax is valid"

      - name: Run Checkov security scan
        uses: bridgecrewio/checkov-action@master
        with:
          framework: cloudformation
          directory: infrastructure/templates/
          soft_fail: false
          output_format: sarif
          output_file_path: checkov-results.sarif
          check: CKV_AWS_ # All AWS checks

      - name: Upload Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: checkov-results.sarif

      - name: Run Checkov in table format for PR comment
        uses: bridgecrewio/checkov-action@master
        if: always()
        with:
          framework: cloudformation
          directory: infrastructure/templates/
          soft_fail: true
          output_format: table

  validate-dockerfile:
    name: Validate Dockerfile
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files, 'Dockerfile')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint Dockerfile linter
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error
          format: sarif
          output-file: hadolint-results.sarif

      - name: Upload Hadolint results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: hadolint-results.sarif

  validate-yaml:
    name: Validate YAML Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          pip install yamllint

      - name: Validate YAML syntax
        run: |
          yamllint -d relaxed infrastructure/templates/*.yaml || true
          yamllint -d relaxed docker-compose.yml || true
          yamllint -d relaxed .github/workflows/*.yml || true

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-iac, validate-dockerfile, validate-yaml]
    if: always()

    steps:
      - name: Check validation results
        run: |
          if [ "${{ needs.validate-iac.result }}" != "success" ] || \
             [ "${{ needs.validate-dockerfile.result }}" != "success" ] || \
             [ "${{ needs.validate-yaml.result }}" != "success" ]; then
            echo "❌ Some validations failed. Please review the errors above."
            exit 1
          else
            echo "✅ All validations passed!"
          fi

