repos:
  # Go formatting and imports
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
        name: Go Format
        description: Run gofmt on Go code
      - id: go-imports
        name: Go Imports
        description: Run goimports on Go code
      - id: go-mod-tidy
        name: Go Mod Tidy
        description: Run go mod tidy
      - id: go-unit-tests
        name: Go Unit Tests
        description: Run go unit tests
        pass_filenames: false
        args: [-short, -race]

  # Go linting with golangci-lint
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.54.2
    hooks:
      - id: golangci-lint
        name: Go Lint
        description: Run golangci-lint
        args: [--timeout=5m]

  # Security scanning with gosec - using local hook instead
  - repo: local
    hooks:
      - id: gosec
        name: Go Security Scanner
        entry: bash -c 'gosec -quiet ./... || true'
        language: system
        pass_filenames: false
        files: '\.(go)$'

  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=1000']
      - id: check-case-conflict
        name: Check for case conflicts
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-yaml
        name: Check YAML
        exclude: (^cloudformation.*\.yaml$|^infrastructure/.*\.yaml$)
      - id: check-json
        name: Check JSON
      - id: end-of-file-fixer
        name: Fix end of files
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: mixed-line-ending
        name: Mixed line ending
        args: ['--fix=lf']
      - id: detect-private-key
        name: Detect private keys
      - id: no-commit-to-branch
        name: Prevent commits to main/master
        args: ['--branch', 'main', '--branch', 'master']

  # Swagger documentation validation
  - repo: local
    hooks:
      - id: swagger-validate
        name: Validate Swagger docs
        entry: bash -c 'swag init --parseDependency --parseInternal -g cmd/server/main.go'
        language: system
        pass_filenames: false
        files: '\.(go)$'

  # Commit message format
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        name: Conventional Commit
        description: Check commit message format
        stages: [commit-msg]
