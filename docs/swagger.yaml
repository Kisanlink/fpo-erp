host: localhost:3000
info:
  contact:
    email: info@kisanlink.in
    name: Kisanlink Support
    url: https://github.com/Kisanlink/fpo-erp
  description: Comprehensive ERP system for agricultural cooperatives with multi-tenant
    architecture
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Kisanlink ERP API
  version: "1.0"
paths:
  /api/v1/attachments:
    get:
      description: Retrieve attachments with optional filters and pagination
      parameters:
      - description: Filter by Sale ID
        example: SALE_12345678
        in: query
        name: sale_id
        type: string
      - description: Filter by Return ID
        example: RET_12345678
        in: query
        name: return_id
        type: string
      - description: 'Number of records to return (default: 10, max: 100)'
        example: 10
        in: query
        name: limit
        type: integer
      - description: 'Number of records to skip (default: 0)'
        example: 0
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Attachments retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.AttachmentResponse'
                  type: array
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: Get Attachments
      tags:
      - Attachments
    post:
      consumes:
      - multipart/form-data
      description: Upload a file attachment for sales or returns (requires authentication)
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      - description: Sale ID (optional)
        example: SALE_12345678
        in: formData
        name: sale_id
        type: string
      - description: Return ID (optional)
        example: RET_12345678
        in: formData
        name: return_id
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Attachment uploaded successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.AttachmentResponse'
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: Upload Attachment
      tags:
      - Attachments
  /api/v1/attachments/{id}:
    delete:
      description: Delete an attachment and its associated file
      parameters:
      - description: Attachment ID
        example: ATT_12345678
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Attachment deleted successfully
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "404":
          description: Attachment not found
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: Delete Attachment
      tags:
      - Attachments
    get:
      description: Retrieve attachment metadata by ID
      parameters:
      - description: Attachment ID
        example: ATT_12345678
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Attachment retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.AttachmentResponse'
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "404":
          description: Attachment not found
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: Get Attachment
      tags:
      - Attachments
  /api/v1/attachments/{id}/download:
    get:
      description: Download the actual file content of an attachment
      parameters:
      - description: Attachment ID
        example: ATT_12345678
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: File download
          schema:
            type: file
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "404":
          description: Attachment not found
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: Download Attachment
      tags:
      - Attachments
  /api/v1/attachments/{id}/info:
    get:
      description: Get detailed information about an attachment including metadata
      parameters:
      - description: Attachment ID
        example: ATT_12345678
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Attachment info retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.AttachmentInfoResponse'
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "404":
          description: Attachment not found
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: Get Attachment Info
      tags:
      - Attachments
  /api/v1/attachments/{id}/url:
    get:
      description: Generate a presigned URL for downloading an attachment
      parameters:
      - description: Attachment ID
        example: ATT_12345678
        in: path
        name: id
