AWSTemplateFormatVersion: '2010-09-09'
Description: 'Shared VPC Infrastructure and Flow Logs for Kisanlink ERP - One VPC for all FPOs'

Parameters:
  Environment:
    Type: String
    Description: 'Environment name (staging or production)'
    AllowedValues:
      - staging
      - production
    Default: staging

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: VPC CIDR block

  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: Public subnet 1 CIDR block

  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: Public subnet 2 CIDR block

  PrivateSubnet1CIDR:
    Type: String
    Default: 10.0.11.0/24
    Description: Private subnet 1 CIDR block

  PrivateSubnet2CIDR:
    Type: String
    Default: 10.0.12.0/24
    Description: Private subnet 2 CIDR block

  RetentionInDays:
    Type: Number
    Description: 'CloudWatch Logs retention in days for VPC Flow Logs (default: 7 for staging, 30 for production)'
    Default: 7
    MinValue: 1
    MaxValue: 3653

Conditions:
  IsProduction: !Equals [!Ref Environment, 'production']

Resources:
  # ========================================
  # VPC and Networking
  # ========================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-vpc-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: SharedVPC
        - Key: ManagedBy
          Value: CloudFormation

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-igw-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: SharedVPC

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnet1CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-public-subnet-1-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: SharedVPC

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PublicSubnet2CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-public-subnet-2-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: SharedVPC

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PrivateSubnet1CIDR
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-private-subnet-1-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: SharedVPC

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PrivateSubnet2CIDR
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-private-subnet-2-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: SharedVPC

  NatGateway1EIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-nat-eip-1-${Environment}'
        - Key: Environment
          Value: !Ref Environment

  NatGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGateway1EIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-nat-1-${Environment}'
        - Key: Environment
          Value: !Ref Environment

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-public-rt-${Environment}'
        - Key: Environment
          Value: !Ref Environment

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-private-rt-1-${Environment}'
        - Key: Environment
          Value: !Ref Environment

  DefaultPrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway1

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      SubnetId: !Ref PrivateSubnet1

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      SubnetId: !Ref PrivateSubnet2

  # ========================================
  # S3 VPC Gateway Endpoint (Cost Optimization)
  # ========================================
  # This endpoint allows ECS tasks in private subnets to access S3
  # through AWS's internal network instead of going through the NAT Gateway.
  # Savings: ~$40/month per environment (NAT Gateway data processing fees eliminated)
  S3VPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      RouteTableIds:
        - !Ref PrivateRouteTable1
      VpcEndpointType: Gateway
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - 's3:GetObject'
              - 's3:PutObject'
              - 's3:DeleteObject'
              - 's3:ListBucket'
              - 's3:GetBucketLocation'
              - 's3:ListBucketMultipartUploads'
              - 's3:AbortMultipartUpload'
              - 's3:ListMultipartUploadParts'
            Resource:
              - 'arn:aws:s3:::*'

  # ========================================
  # Shared CloudTrail Audit Logs (Cost Optimization)
  # ========================================
  # Single CloudTrail trail for all FPOs with per-FPO S3 prefixes
  # Savings: ~$48/month (eliminates per-FPO CloudTrail charges)
  SharedAuditLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'kisanlink-erp-shared-audit-logs-${Environment}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldAuditLogs
            Status: Enabled
            ExpirationInDays: !If [IsProduction, 2555, 90]  # 7 years for production, 90 days for staging
            NoncurrentVersionExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-audit-logs-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: SharedCloudTrailAuditLogs
        - Key: ManagedBy
          Value: CloudFormation

  SharedAuditLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SharedAuditLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: 's3:GetBucketAcl'
            Resource: !GetAtt SharedAuditLogsBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: 's3:PutObject'
            Resource: !Sub '${SharedAuditLogsBucket.Arn}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'

  SharedAuditTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: SharedAuditLogsBucketPolicy
    Properties:
      TrailName: !Sub 'kisanlink-erp-shared-audit-${Environment}'
      S3BucketName: !Ref SharedAuditLogsBucket
      IncludeGlobalServiceEvents: true
      IsLogging: true
      IsMultiRegionTrail: false
      EnableLogFileValidation: true
      EventSelectors:
        - ReadWriteType: All  # Track all read/write operations for comprehensive auditing
          IncludeManagementEvents: true
          DataResources:
            - Type: 'AWS::S3::Object'
              Values:
                - 'arn:aws:s3:::*/*'  # All S3 buckets (includes all FPO attachment buckets)
            - Type: 'AWS::SecretsManager::Secret'
              Values:
                - 'arn:aws:secretsmanager:*:*:secret:*'  # All Secrets Manager secrets
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-audit-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: SharedCloudTrailAuditLogs
        - Key: ManagedBy
          Value: CloudFormation

  # ========================================
  # VPC Flow Logs
  # ========================================
  VPCFlowLogsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'kisanlink-erp-shared-vpc-flow-logs-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: CloudWatchLogGroupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                  - 'logs:DescribeLogGroups'
                  - 'logs:DescribeLogStreams'
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/vpc/flowlogs/kisanlink-erp-shared-*'
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-vpc-flow-logs-role-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: SharedVPCFlowLogs
        - Key: ManagedBy
          Value: CloudFormation

  VPCFlowLogsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/vpc/flowlogs/kisanlink-erp-shared-${Environment}'
      RetentionInDays: !If [IsProduction, 30, 7]  # Cost optimization: 7 days for staging, 30 for production
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-vpc-flow-logs-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: SharedVPCFlowLogs
        - Key: ManagedBy
          Value: CloudFormation

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    DependsOn: VPC
    Properties:
      ResourceType: VPC
      ResourceIds:
        - !Ref VPC
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref VPCFlowLogsLogGroup
      DeliverLogsPermissionArn: !GetAtt VPCFlowLogsRole.Arn
      Tags:
        - Key: Name
          Value: !Sub 'kisanlink-erp-shared-vpc-flow-log-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: SharedVPCFlowLogs
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  VPCId:
    Description: 'Shared VPC ID for all FPO deployments'
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPCId'

  PublicSubnet1Id:
    Description: 'Public Subnet 1 ID'
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnet1Id'

  PublicSubnet2Id:
    Description: 'Public Subnet 2 ID'
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnet2Id'

  PrivateSubnet1Id:
    Description: 'Private Subnet 1 ID'
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet1Id'

  PrivateSubnet2Id:
    Description: 'Private Subnet 2 ID'
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet2Id'

  VPCCIDR:
    Description: 'VPC CIDR block'
    Value: !Ref VpcCIDR
    Export:
      Name: !Sub '${AWS::StackName}-VPCCIDR'

  VPCFlowLogId:
    Description: 'VPC Flow Log ID'
    Value: !Ref VPCFlowLog
    Export:
      Name: !Sub '${AWS::StackName}-VPCFlowLogId'

  VPCFlowLogsLogGroupName:
    Description: 'CloudWatch Log Group name for VPC Flow Logs'
    Value: !Ref VPCFlowLogsLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-VPCFlowLogsLogGroupName'

  VPCFlowLogsLogGroupArn:
    Description: 'CloudWatch Log Group ARN for VPC Flow Logs'
    Value: !GetAtt VPCFlowLogsLogGroup.Arn
    Export:
      Name: !Sub '${AWS::StackName}-VPCFlowLogsLogGroupArn'

