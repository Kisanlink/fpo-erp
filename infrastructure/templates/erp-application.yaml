AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::LanguageExtensions
Description: 'Kisanlink ERP Application Infrastructure - Multi-tenant deployment for FPO organizations'

Parameters:
  FPOIdentifier:
    Type: String
    Description: 'Unique FPO/Organization identifier (e.g., ORGN00000001)'

  Environment:
    Type: String
    Description: 'Environment name'
    AllowedValues:
      - staging
      - production
    Default: staging

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'Shared VPC ID for ERP deployments'

  PublicSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: 'Public subnet 1 ID for ALB'

  PublicSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: 'Public subnet 2 ID for ALB'

  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: 'Private subnet 1 ID for ECS tasks and RDS'

  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: 'Private subnet 2 ID for ECS tasks and RDS'

  ECRImageUri:
    Type: String
    Description: 'ECR image URI for ERP container (e.g., 123456789012.dkr.ecr.us-west-2.amazonaws.com/kisanlink-erp:latest)'

  ContainerPort:
    Type: Number
    Description: 'Port the ERP container listens on'
    Default: 8080

  DesiredCount:
    Type: Number
    Description: 'Number of ECS tasks to run'
    Default: 2
    MinValue: 1
    MaxValue: 10

  TaskCPU:
    Type: String
    Description: 'CPU units for Fargate task (256, 512, 1024, 2048, 4096)'
    Default: '512'
    AllowedValues:
      - '256'
      - '512'
      - '1024'
      - '2048'
      - '4096'

  TaskMemory:
    Type: String
    Description: 'Memory for Fargate task in MB'
    Default: '1024'
    AllowedValues:
      - '512'
      - '1024'
      - '2048'
      - '4096'
      - '8192'

  DBInstanceClass:
    Type: String
    Description: 'RDS instance class'
    Default: 'db.t3.micro'
    AllowedValues:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
      - db.r5.large

  DBAllocatedStorage:
    Type: Number
    Description: 'RDS allocated storage in GB'
    Default: 20
    MinValue: 20
    MaxValue: 1000

  DBUsername:
    Type: String
    Description: 'Database master username'
    Default: 'erp_admin'
    NoEcho: true

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: 'Database password (will be stored in Secrets Manager)'

  AAAGrpcAddress:
    Type: String
    Description: 'AAA service gRPC address'
    Default: 'aaa-grpc.kisanlink.com:9090'

  AAAJWTSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: 'AAA JWT secret key (will be stored in Secrets Manager)'

  JWTSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: 'JWT secret key (will be stored in Secrets Manager)'

  AWSRegion:
    Type: String
    Description: 'AWS region for S3 and other services'
    Default: 'us-west-2'

  CertificateArn:
    Type: String
    Description: 'ACM certificate ARN for HTTPS (optional, leave empty for HTTP only)'
    Default: ''

  EcommerceGrpcAddress:
    Type: String
    Description: 'E-commerce service gRPC address (host:port) for webhook integration'
    Default: ''

  DBSSLMode:
    Type: String
    Description: 'PostgreSQL SSL mode (disable, require, verify-ca, verify-full)'
    AllowedValues:
      - disable
      - require
      - verify-ca
      - verify-full
    Default: disable

  AAAAPIKey:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: 'AAA API key for service-to-service authentication between ERP and AAA service'

  CORSAllowedHeaders:
    Type: String
    Description: 'Comma-separated list of allowed CORS headers'
    Default: 'Content-Type,Authorization'

Conditions:
  IsProduction: !Equals [!Ref Environment, 'production']
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]

Resources:
  # ========================================
  # S3 Bucket for File Storage
  # ========================================
  AttachmentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::ToLower:
          Fn::Sub: '${FPOIdentifier}-${Environment}-erp-attachments'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: !If [IsProduction, 'Enabled', 'Suspended']
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-attachments'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier
        - Key: ManagedBy
          Value: CloudFormation

  # ========================================
  # ECS Cluster (Per-FPO Isolation)
  # ========================================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${FPOIdentifier}-${Environment}-erp-cluster'
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
          Base: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-cluster'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier
        - Key: ManagedBy
          Value: CloudFormation

  # ========================================
  # RDS PostgreSQL Database
  # ========================================
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub '${FPOIdentifier}-${Environment}-erp-db-subnet'
      DBSubnetGroupDescription: !Sub 'Subnet group for ${FPOIdentifier} ${Environment} ERP database'
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-db-subnet'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${FPOIdentifier}-${Environment}-erp-db-sg'
      GroupDescription: !Sub 'Security group for ${FPOIdentifier} ${Environment} ERP database'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref ECSTaskSecurityGroup
          Description: 'Allow PostgreSQL from ECS tasks'
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-db-sg'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier

  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub '${FPOIdentifier}-${Environment}-erp-db'
      DBName: !Sub '${FPOIdentifier}_erp'
      Engine: postgres
      EngineVersion: '17.4'
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      BackupRetentionPeriod: !If [IsProduction, 7, 1]
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:04:00-sun:05:00'
      MultiAZ: !If [IsProduction, true, false]
      EnableCloudwatchLogsExports:
        - postgresql
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-db'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier

  DBReadReplica:
    Type: AWS::RDS::DBInstance
    Condition: IsProduction
    DependsOn: DBInstance
    Properties:
      SourceDBInstanceIdentifier: !Ref DBInstance
      DBInstanceIdentifier: !Sub '${FPOIdentifier}-${Environment}-erp-db-replica'
      DBInstanceClass: !Ref DBInstanceClass
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-db-replica'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier

  # ========================================
  # AWS Backup Configuration
  # ========================================
  BackupVaultKey:
    Type: AWS::KMS::Key
    Condition: IsProduction
    Properties:
      Description: !Sub 'Encryption key for ${FPOIdentifier} ${Environment} ERP backups'
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow AWS Backup to use the key
            Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action:
              - 'kms:CreateGrant'
              - 'kms:DescribeKey'
              - 'kms:Decrypt'
              - 'kms:GenerateDataKey'
            Resource: '*'

  BackupVault:
    Type: AWS::Backup::BackupVault
    Condition: IsProduction
    Properties:
      BackupVaultName: !Sub '${FPOIdentifier}-${Environment}-erp-vault'
      EncryptionKeyArn: !GetAtt BackupVaultKey.Arn

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Condition: IsProduction
    Properties:
      BackupPlan:
        BackupPlanName: !Sub '${FPOIdentifier}-${Environment}-erp-backup-plan'
        BackupPlanRule:
          - RuleName: DailyBackups
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: 'cron(0 5 * * ? *)'
            StartWindowMinutes: 60
            CompletionWindowMinutes: 120
            Lifecycle:
              DeleteAfterDays: 35
              MoveToColdStorageAfterDays: 7
            RecoveryPointTags:
              BackupType: Daily
              FPO: !Ref FPOIdentifier
              Environment: !Ref Environment

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Condition: IsProduction
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: !Sub '${FPOIdentifier}-${Environment}-rds-backup'
        IamRoleArn: !Sub 'arn:aws:iam::${AWS::AccountId}:role/service-role/AWSBackupDefaultServiceRole'
        Resources:
          - !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:db:${DBInstance}'

  # ========================================
  # Secrets Manager
  # ========================================
  DBPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${FPOIdentifier}/${Environment}/erp/db-password'
      Description: RDS PostgreSQL Password
      SecretString: !Ref DBPassword
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-db-password'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier
        - Key: ManagedBy
          Value: CloudFormation

  JWTSecretParameter:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${FPOIdentifier}/${Environment}/erp/jwt-secret'
      Description: JWT Secret Key
      SecretString: !Ref JWTSecret
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-jwt-secret'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier
        - Key: ManagedBy
          Value: CloudFormation

  AAAJWTSecretParameter:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${FPOIdentifier}/${Environment}/erp/aaa-jwt-secret'
      Description: AAA JWT Secret Key
      SecretString: !Ref AAAJWTSecret
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-aaa-jwt-secret'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier
        - Key: ManagedBy
          Value: CloudFormation

  WebhookSecretParameter:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${FPOIdentifier}/${Environment}/erp/webhook-secret'
      Description: Webhook HMAC secret for signature verification
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: 'secret'
        PasswordLength: 64
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-webhook-secret'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier
        - Key: ManagedBy
          Value: CloudFormation

  EcommerceAuthTokenParameter:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${FPOIdentifier}/${Environment}/erp/ecommerce-auth-token'
      Description: E-commerce service gRPC authentication token
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: 'token'
        PasswordLength: 64
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-ecommerce-auth-token'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier
        - Key: ManagedBy
          Value: CloudFormation

  AAAAPIKeyParameter:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${FPOIdentifier}/${Environment}/erp/aaa-api-key'
      Description: AAA API Key for service-to-service authentication
      SecretString: !Ref AAAAPIKey
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-aaa-api-key'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier
        - Key: ManagedBy
          Value: CloudFormation

  # Note: VPC Flow Logs are managed in a separate shared infrastructure stack
  # See: infrastructure/templates/shared-vpc-flow-logs.yaml
  # This ensures only one flow log exists per VPC for all FPOs

  # ========================================
  # SNS Topic for CloudWatch Alerts
  # ========================================
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${FPOIdentifier}-${Environment}-erp-alerts'
      DisplayName: !Sub 'Kisanlink ERP Alerts - ${FPOIdentifier} ${Environment}'
      Subscription:
        - Endpoint: devops@kisanlink.com
          Protocol: email
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-alerts'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier
        - Key: ManagedBy
          Value: CloudFormation

  # ========================================
  # CloudTrail Audit Logging
  # ========================================
