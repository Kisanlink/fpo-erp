  # ========================================
  # Application Load Balancer
  # ========================================
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${FPOIdentifier}-${Environment}-erp-alb-sg'
      GroupDescription: !Sub 'Security group for ${FPOIdentifier} ${Environment} ERP ALB'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: 'Allow HTTP from anywhere'
        - !If
          - HasCertificate
          - IpProtocol: tcp
            FromPort: 443
            ToPort: 443
            CidrIp: 0.0.0.0/0
            Description: 'Allow HTTPS from anywhere'
          - !Ref AWS::NoValue
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: 'Allow all outbound traffic'
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-alb-sg'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${FPOIdentifier}-${Environment}-erp-alb'
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-alb'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${FPOIdentifier}-${Environment}-erp-tg'
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-tg'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier

  ALBListenerHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref ALBTargetGroup

  ALBListenerHTTPS:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # ========================================
  # ECS Task Definition and Service
  # ========================================
  ECSTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${FPOIdentifier}-${Environment}-erp-task-sg'
      GroupDescription: !Sub 'Security group for ${FPOIdentifier} ${Environment} ERP ECS tasks'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: 'Allow traffic from ALB'
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: 'Allow all outbound traffic'
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-task-sg'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${FPOIdentifier}-${Environment}-erp-exec-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'secretsmanager:GetSecretValue'
                  - 'kms:Decrypt'
                Resource:
                  - !Ref DBPasswordSecret
                  - !Ref JWTSecretParameter
                  - !Ref AAAJWTSecretParameter
                  - !Ref WebhookSecretParameter
                  - !Ref EcommerceAuthTokenParameter
                  - !Ref AAAAPIKeyParameter
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-exec-role'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${FPOIdentifier}-${Environment}-erp-task-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                  - 's3:ListBucket'
                Resource:
                  - !GetAtt AttachmentsBucket.Arn
                  - !Sub '${AttachmentsBucket.Arn}/*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-task-role'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier

  ECSLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${FPOIdentifier}-${Environment}-erp'
      RetentionInDays: !If [IsProduction, 30, 7]

  ECSTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${FPOIdentifier}-${Environment}-erp'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref TaskCPU
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: erp-container
          Image: !Ref ECRImageUri
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Essential: true
          Environment:
            - Name: SERVER_HTTP_PORT
              Value: !Sub '${ContainerPort}'
            - Name: SERVER_MODE
              Value: !If [IsProduction, 'release', 'debug']
            - Name: SERVER_PUBLIC_URL
              Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'
            - Name: POSTGRES_HOST
              Value: !GetAtt DBInstance.Endpoint.Address
            - Name: POSTGRES_PORT
              Value: !Sub '${DBInstance.Endpoint.Port}'
            - Name: POSTGRES_DB
              Value: !Sub '${FPOIdentifier}_erp'
            - Name: POSTGRES_USER
              Value: !Ref DBUsername
            - Name: POSTGRES_MAX_IDLE_CONNS
              Value: '10'
            - Name: POSTGRES_MAX_OPEN_CONNS
              Value: '100'
            - Name: POSTGRES_CONN_MAX_LIFETIME_SECONDS
              Value: '3600'
            - Name: AAA_GRPC_ADDRESS
              Value: !Ref AAAGrpcAddress
            - Name: AAA_CACHE_TTL
              Value: '3600'
            - Name: AAA_TIMEOUT_SECONDS
              Value: '30'
            - Name: AAA_ENABLED
              Value: 'true'
            - Name: AWS_REGION
              Value: !Ref AWSRegion
            - Name: AWS_S3_BUCKET
              Value: !Ref AttachmentsBucket
            - Name: CORS_ALLOWED_ORIGINS
              Value: !If
                - IsProduction
                - 'https://erp.kisanlink.com,https://app.kisanlink.com'
                - 'http://localhost:3000,http://localhost:3001,https://staging.kisanlink.com'
            - Name: CORS_ALLOWED_HEADERS
              Value: !Ref CORSAllowedHeaders
            - Name: JWT_EXPIRY_HOURS
              Value: '24'
            - Name: DB_POSTGRES_SSLMODE
              Value: !Ref DBSSLMode
            - Name: WEBHOOK_TIMEOUT_SECONDS
              Value: '30'
            - Name: WEBHOOK_MAX_PAYLOAD_BYTES
              Value: '10485760'
            - Name: ECOMMERCE_GRPC_ADDRESS
              Value: !Ref EcommerceGrpcAddress
            - Name: ECOMMERCE_GRPC_TIMEOUT_SECONDS
              Value: '5'
            - Name: ECOMMERCE_GRPC_USE_TLS
              Value: 'false'
            - Name: AWS_USE_PATH_STYLE
              Value: 'false'
          Secrets:
            - Name: POSTGRES_PASSWORD
              ValueFrom: !Ref DBPasswordSecret
            - Name: JWT_SECRET
              ValueFrom: !Ref JWTSecretParameter
            - Name: AAA_JWT_SECRET
              ValueFrom: !Ref AAAJWTSecretParameter
            - Name: WEBHOOK_SECRET
              ValueFrom: !Ref WebhookSecretParameter
            - Name: ECOMMERCE_GRPC_AUTH_TOKEN
              ValueFrom: !Ref EcommerceAuthTokenParameter
            - Name: AAA_API_KEY
              ValueFrom: !Ref AAAAPIKeyParameter
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ECSLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: erp
          HealthCheck:
            Command:
              - CMD-SHELL
              - !Sub 'curl -f http://localhost:${ContainerPort}/health || exit 1'
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-task'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier

  ECSService:
    Type: AWS::ECS::Service
    DependsOn:
      - ALBListenerHTTP
      - DBInstance
    Properties:
      ServiceName: !Sub '${FPOIdentifier}-${Environment}-erp-service'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ECSTaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1Id
            - !Ref PrivateSubnet2Id
          SecurityGroups:
            - !Ref ECSTaskSecurityGroup
      LoadBalancers:
        - ContainerName: erp-container
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref ALBTargetGroup
      HealthCheckGracePeriodSeconds: 120
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      Tags:
        - Key: Name
          Value: !Sub '${FPOIdentifier}-${Environment}-erp-service'
        - Key: Environment
          Value: !Ref Environment
        - Key: FPO
          Value: !Ref FPOIdentifier

  # ========================================
  # ECS Autoscaling
  # ========================================
  ECSScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      ServiceNamespace: ecs
      ResourceId: !Sub 'service/${ECSCluster}/${ECSService.Name}'
      ScalableDimension: ecs:service:DesiredCount
      MinCapacity: !If [IsProduction, 2, 1]
      MaxCapacity: !If [IsProduction, 10, 4]
      RoleARN: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService'

  # CPU-based Scaling Policy
  ECSCPUScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub '${FPOIdentifier}-${Environment}-cpu-scaling'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ECSScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # Memory-based Scaling Policy
  ECSMemoryScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub '${FPOIdentifier}-${Environment}-memory-scaling'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ECSScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization
        TargetValue: 80.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # ========================================
  # CloudWatch Alarms
  # ========================================
  HighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${FPOIdentifier}-${Environment}-erp-high-cpu'
      AlarmDescription: !Sub 'High CPU utilization for ${FPOIdentifier} ${Environment} ERP service'
      MetricName: CPUUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Dimensions:
        - Name: ServiceName
          Value: !GetAtt ECSService.Name
        - Name: ClusterName
          Value: !Ref ECSCluster

  HighMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${FPOIdentifier}-${Environment}-erp-high-memory'
      AlarmDescription: !Sub 'High memory utilization for ${FPOIdentifier} ${Environment} ERP service'
      MetricName: MemoryUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Dimensions:
        - Name: ServiceName
          Value: !GetAtt ECSService.Name
        - Name: ClusterName
          Value: !Ref ECSCluster

  DatabaseConnectionsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${FPOIdentifier}-${Environment}-erp-db-connections'
      AlarmDescription: !Sub 'High database connections for ${FPOIdentifier} ${Environment} ERP database'
      MetricName: DatabaseConnections
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref DBInstance

  # ALB 5xx Error Alarm
  ALBTarget5XXAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${FPOIdentifier}-${Environment}-erp-alb-5xx-errors'
      AlarmDescription: 'Alert when ALB target 5xx errors exceed threshold'
      MetricName: HTTPCode_Target_5XX_Count
      Namespace: AWS/ApplicationELB
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  # ALB High Latency Alarm
  ALBHighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${FPOIdentifier}-${Environment}-erp-alb-high-latency'
      AlarmDescription: 'Alert when ALB response time exceeds 2 seconds'
      MetricName: TargetResponseTime
      Namespace: AWS/ApplicationELB
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 2.0
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  # ALB Unhealthy Host Alarm
  ALBUnhealthyHostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${FPOIdentifier}-${Environment}-erp-alb-unhealthy-hosts'
      AlarmDescription: 'Alert when there are unhealthy targets'
      MetricName: UnHealthyHostCount
      Namespace: AWS/ApplicationELB
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: TargetGroup
          Value: !GetAtt ALBTargetGroup.TargetGroupFullName
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  # ALB Request Count Anomaly
  ALBRequestCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${FPOIdentifier}-${Environment}-erp-alb-request-spike'
      AlarmDescription: 'Alert on unusual request volume'
      MetricName: RequestCount
      Namespace: AWS/ApplicationELB
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !If [IsProduction, 10000, 5000]
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      AlarmActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  # ========================================
  # Cost Monitoring Alarms
  # ========================================
  # High ECS Task Count Alarm (Cost Indicator)
  HighECSTaskCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProduction
    Properties:
      AlarmName: !Sub '${FPOIdentifier}-${Environment}-erp-high-task-count'
      AlarmDescription: 'Alert when ECS task count is high (cost indicator)'
      MetricName: RunningTaskCount
      Namespace: AWS/ECS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 8
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ServiceName
          Value: !GetAtt ECSService.Name
        - Name: ClusterName
          Value: !Ref ECSCluster
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  # RDS Storage Cost Alarm
  RDSStorageCostAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProduction
    Properties:
      AlarmName: !Sub '${FPOIdentifier}-${Environment}-erp-rds-storage-high'
      AlarmDescription: 'Alert when RDS storage usage is high (cost indicator)'
      MetricName: FreeStorageSpace
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5000000000
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref DBInstance
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  # ========================================
  # CloudWatch Dashboard
  # ========================================
  ERPDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub '${FPOIdentifier}-${Environment}-ERP-Dashboard'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ECS", "CPUUtilization", "ServiceName", "${FPOIdentifier}-${Environment}-erp-service", "ClusterName", "${FPOIdentifier}-${Environment}-erp-cluster", { "stat": "Average", "label": "CPU Average" } ],
                  [ "...", { "stat": "Maximum", "label": "CPU Maximum" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "ECS CPU Utilization",
                "period": 300,
                "yAxis": {
                  "left": {
                    "min": 0,
                    "max": 100
                  }
                },
                "annotations": {
                  "horizontal": [
                    {
                      "label": "High CPU Threshold",
                      "value": 80,
                      "fill": "above"
                    }
                  ]
                }
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ECS", "MemoryUtilization", "ServiceName", "${FPOIdentifier}-${Environment}-erp-service", "ClusterName", "${FPOIdentifier}-${Environment}-erp-cluster", { "stat": "Average", "label": "Memory Average" } ],
                  [ "...", { "stat": "Maximum", "label": "Memory Maximum" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "ECS Memory Utilization",
                "period": 300,
                "yAxis": {
                  "left": {
                    "min": 0,
                    "max": 100
                  }
                },
                "annotations": {
                  "horizontal": [
                    {
                      "label": "High Memory Threshold",
                      "value": 80,
                      "fill": "above"
                    }
                  ]
                }
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 8,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ApplicationELB", "TargetResponseTime", { "stat": "Average", "label": "Response Time (avg)" } ],
                  [ "...", { "stat": "p99", "label": "Response Time (p99)" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "ALB Response Time",
                "period": 300,
                "yAxis": {
                  "left": {
                    "min": 0
                  }
                }
              }
            },
            {
              "type": "metric",
              "x": 8,
              "y": 6,
              "width": 8,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ApplicationELB", "RequestCount", { "stat": "Sum", "label": "Total Requests" } ],
                  [ ".", "HTTPCode_Target_2XX_Count", { "stat": "Sum", "label": "2XX Success" } ],
                  [ ".", "HTTPCode_Target_4XX_Count", { "stat": "Sum", "label": "4XX Client Errors" } ],
                  [ ".", "HTTPCode_Target_5XX_Count", { "stat": "Sum", "label": "5XX Server Errors" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "ALB Request Count & Status Codes",
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 16,
              "y": 6,
              "width": 8,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ApplicationELB", "HealthyHostCount", { "stat": "Average", "label": "Healthy Targets" } ],
                  [ ".", "UnHealthyHostCount", { "stat": "Average", "label": "Unhealthy Targets" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "ALB Target Health",
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 12,
              "width": 8,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/RDS", "CPUUtilization", "DBInstanceIdentifier", "${FPOIdentifier}-${Environment}-erp-db", { "stat": "Average" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "RDS CPU Utilization",
                "period": 300,
                "yAxis": {
                  "left": {
                    "min": 0,
                    "max": 100
                  }
                }
              }
            },
            {
              "type": "metric",
              "x": 8,
              "y": 12,
              "width": 8,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/RDS", "DatabaseConnections", "DBInstanceIdentifier", "${FPOIdentifier}-${Environment}-erp-db", { "stat": "Average", "label": "Active Connections" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "RDS Database Connections",
                "period": 300,
                "annotations": {
                  "horizontal": [
                    {
                      "label": "High Connection Threshold",
                      "value": 80,
                      "fill": "above"
                    }
                  ]
                }
              }
            },
            {
              "type": "metric",
              "x": 16,
              "y": 12,
              "width": 8,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/RDS", "FreeStorageSpace", "DBInstanceIdentifier", "${FPOIdentifier}-${Environment}-erp-db", { "stat": "Average" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "RDS Free Storage Space",
                "period": 300
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 18,
              "width": 24,
              "height": 6,
              "properties": {
                "query": "SOURCE '/ecs/${FPOIdentifier}-${Environment}-erp'\n| fields @timestamp, @message\n| filter @message like /ERROR/\n| sort @timestamp desc\n| limit 20",
                "region": "${AWS::Region}",
                "stacked": false,
                "title": "Recent Application Errors",
                "view": "table"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 24,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ECS", "RunningTaskCount", "ServiceName", "${FPOIdentifier}-${Environment}-erp-service", "ClusterName", "${FPOIdentifier}-${Environment}-erp-cluster", { "stat": "Average", "label": "Running Tasks" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "ECS Running Task Count",
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 24,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/RDS", "ReadLatency", "DBInstanceIdentifier", "${FPOIdentifier}-${Environment}-erp-db", { "stat": "Average", "label": "Read Latency" } ],
                  [ ".", "WriteLatency", "DBInstanceIdentifier", "${FPOIdentifier}-${Environment}-erp-db", { "stat": "Average", "label": "Write Latency" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "RDS Read/Write Latency",
                "period": 300
              }
            }
          ]
        }

Outputs:
  LoadBalancerURL:
    Description: 'Application Load Balancer URL'
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'
    Export:
      Name: !Sub '${AWS::StackName}-LoadBalancerURL'

  LoadBalancerDNSName:
    Description: 'Application Load Balancer DNS Name'
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-LoadBalancerDNS'

  DatabaseEndpoint:
    Description: 'RDS database endpoint'
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: !Sub '${AWS::StackName}-DatabaseEndpoint'

  DatabasePort:
    Description: 'RDS database port'
    Value: !GetAtt DBInstance.Endpoint.Port
    Export:
      Name: !Sub '${AWS::StackName}-DatabasePort'

  DBReadReplicaEndpoint:
    Condition: IsProduction
    Description: 'RDS read replica endpoint (production only)'
    Value: !GetAtt DBReadReplica.Endpoint.Address
    Export:
      Name: !Sub '${AWS::StackName}-DBReadReplicaEndpoint'

  DatabaseName:
    Description: 'RDS database name'
    Value: !Sub '${FPOIdentifier}_erp'
    Export:
      Name: !Sub '${AWS::StackName}-DatabaseName'

  S3BucketName:
    Description: 'S3 bucket for attachments'
    Value: !Ref AttachmentsBucket
    Export:
      Name: !Sub '${AWS::StackName}-S3Bucket'

  ECSServiceName:
    Description: 'ECS service name'
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub '${AWS::StackName}-ECSService'

  ECSClusterName:
    Description: 'ECS cluster name'
    Value: !Ref ECSCluster
    Export:
      Name: !Sub '${AWS::StackName}-ECSCluster'

  ECSClusterArn:
    Description: 'ECS cluster ARN'
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ECSClusterArn'

  LogGroupName:
    Description: 'CloudWatch log group name'
    Value: !Ref ECSLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-LogGroup'

  AlertTopicArn:
    Description: 'SNS topic ARN for CloudWatch alerts'
    Value: !Ref AlertTopic
    Export:
      Name: !Sub '${AWS::StackName}-AlertTopicArn'

  DashboardURL:
    Description: 'CloudWatch Dashboard URL'
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${FPOIdentifier}-${Environment}-ERP-Dashboard'
    Export:
      Name: !Sub '${AWS::StackName}-DashboardURL'
